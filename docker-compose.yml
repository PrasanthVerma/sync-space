version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: syncspace-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: syncspace-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongodb_data:
