# Railway Deployment Configuration — Execution Engine
# Docs: https://docs.railway.com/reference/config-as-code

[build]
  # Force Railway to use the Dockerfile — NOT nixpacks (default)
  builder        = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  # Run setup.sh first to build sandbox Docker images, then start the server
  startCommand = "sh setup.sh && node src/index.js"

  # Railway will GET /health every 30s; non-200 = unhealthy → restart
  healthcheckPath    = "/health"
  healthcheckTimeout = 60            # longer timeout to allow setup.sh image builds

  # Restart policy
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 3

# Required for Docker-in-Docker — allows the container to access the Docker daemon
[experimental]
  privileged = true
